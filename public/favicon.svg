<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#grad)" rx="50"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="3" opacity="0.2"/>
  
  <!-- Money bag icon -->
  <g transform="translate(50, 60)">
    <!-- Bag body -->
    <path d="M 30 20 Q 50 10 70 20 L 70 80 Q 70 95 55 95 L 15 95 Q 0 95 0 80 Z" 
          fill="white" opacity="0.95"/>
    <!-- Coins inside -->
    <circle cx="20" cy="50" r="8" fill="#fbbf24" opacity="0.8"/>
    <circle cx="35" cy="60" r="8" fill="#fbbf24" opacity="0.8"/>
    <circle cx="50" cy="55" r="8" fill="#fbbf24" opacity="0.8"/>
    <!-- Draw string -->
    <path d="M 20 20 Q 20 5 35 5 Q 50 5 50 20" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  </g>
  
  <!-- Number 9 -->
  <text x="100" y="180" font-size="80" font-weight="bold" fill="white" 
        text-anchor="middle" opacity="0.7" font-family="Arial, sans-serif">9</text>
</svg>
